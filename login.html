<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nova Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl flex overflow-hidden">
        <!-- Left Side - Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12">
            <a href="HPP.html" class="flex items-center gap-2 mb-8 hover:opacity-80 transition">
                <i class="fas fa-university text-blue-600 text-2xl"></i>
                <span class="text-xl font-bold text-gray-800">Nova Bank</span>
            </a>
            
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Welcome Back</h2>
            <p class="text-gray-500 mb-8">Please enter your details to sign in.</p>

            <form action="dashboard.html">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition" placeholder="you@example.com">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
                    </div>
                    <div class="text-right mt-2">
                        <a href="forgot-password.html" class="text-sm text-blue-600 hover:underline">Forgot password?</a>
                    </div>
                </div>

                <button class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md hover:shadow-lg">
                    Sign In
                </button>
            </form>

            <div class="mt-8 text-center text-gray-600 text-sm">
                Don't have an account? <a href="open-account.html" class="text-blue-600 font-bold hover:underline">Sign up</a>
            </div>
        </div>

        <!-- Right Side - Image/Info (Hidden on small screens) -->
        <div class="hidden md:block w-1/2 bg-blue-600 relative p-12 text-white">
            <div class="absolute inset-0 bg-gradient-to-br from-blue-600 to-blue-900 opacity-90"></div>
            <img src="https://images.unsplash.com/photo-1556742049-0cfed4f7a07d?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay" alt="Office">
            
            <div class="relative z-10 flex flex-col justify-center h-full">
                <h3 class="text-3xl font-bold mb-4">Secure Banking</h3>
                <p class="text-blue-100 leading-relaxed mb-6">Manage your finances securely from anywhere in the world with military-grade encryption.</p>
                <div class="flex items-center gap-4">
                    <span class="text-sm font-semibold bg-white/20 px-4 py-2 rounded-full backdrop-blur-sm">🔒 256-bit Encryption</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
