<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Account - Nova Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <!-- Registration Card -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-4xl flex overflow-hidden">
        <!-- Left Side - Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12">
            <a href="HPP.html" class="flex items-center gap-2 mb-8 hover:opacity-80 transition">
                <i class="fas fa-university text-blue-600 text-2xl"></i>
                <span class="text-xl font-bold text-gray-800">Nova Bank</span>
            </a>
            
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Get Started</h2>
            <p class="text-gray-500 mb-8">Join over 2 million customers today.</p>

            <form action="dashboard.html">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Full Name</label>
                    <input type="text" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition" placeholder="John Doe">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                    <input type="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition" placeholder="you@example.com">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Account Type</label>
                    <div class="relative">
                        <select class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition appearance-none bg-white">
                            <option>Personal Checking (Free)</option>
                            <option>Savings Plus</option>
                            <option>Business Account</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-700">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Create Password</label>
                    <input type="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
                </div>

                <button class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md hover:shadow-lg">
                    Create Account
                </button>
            </form>

            <div class="mt-8 text-center text-gray-600 text-sm">
                Already have an account? <a href="login.html" class="text-blue-600 font-bold hover:underline">Log in</a>
            </div>
        </div>

        <!-- Right Side - Image -->
        <div class="hidden md:block w-1/2 bg-blue-600 relative p-12 text-white">
            <div class="absolute inset-0 bg-gradient-to-tr from-blue-900 to-blue-500 opacity-90"></div>
            <img src="https://images.unsplash.com/photo-1601597111158-2fceff292cdc?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay" alt="Banking">
            
            <div class="relative z-10 flex flex-col justify-center h-full">
                <h3 class="text-3xl font-bold mb-4">Smart Banking</h3>
                <ul class="space-y-4 text-blue-100">
                    <li class="flex items-center gap-3"><i class="fas fa-check-circle text-green-400"></i> No monthly fees</li>
                    <li class="flex items-center gap-3"><i class="fas fa-check-circle text-green-400"></i> Early direct deposit</li>
                    <li class="flex items-center gap-3"><i class="fas fa-check-circle text-green-400"></i> 60,000+ fee-free ATMs</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
