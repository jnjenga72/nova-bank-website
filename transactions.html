<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transactions - Nova Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <nav class="bg-white shadow py-4 mb-6">
        <div class="container mx-auto px-6">
            <a href="dashboard.html" class="text-blue-600 font-bold"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </nav>
    <div class="container mx-auto px-6 pb-10">
        <h1 class="text-3xl font-bold mb-6">Transaction History</h1>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-4">Date</th>
                        <th class="p-4">Description</th>
                        <th class="p-4">Category</th>
                        <th class="p-4 text-right">Amount</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr class="hover:bg-gray-50">
                        <td class="p-4">Oct 24, 2023</td>
                        <td class="p-4 font-bold">Amazon Purchase</td>
                        <td class="p-4"><span class="bg-gray-100 px-2 py-1 rounded text-xs">Shopping</span></td>
                        <td class="p-4 text-right font-bold">-$120.50</td>
                    </tr>
                    <tr class="hover:bg-gray-50">
                        <td class="p-4">Oct 23, 2023</td>
                        <td class="p-4 font-bold">Tech Corp Payroll</td>
                        <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Income</span></td>
                        <td class="p-4 text-right font-bold text-green-600">+$3,250.00</td>
                    </tr>
                    <tr class="hover:bg-gray-50">
                        <td class="p-4">Oct 22, 2023</td>
                        <td class="p-4 font-bold">Netflix Subscription</td>
                        <td class="p-4"><span class="bg-gray-100 px-2 py-1 rounded text-xs">Entertainment</span></td>
                        <td class="p-4 text-right font-bold">-$15.99</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
