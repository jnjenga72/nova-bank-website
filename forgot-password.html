<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Nova Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h2 class="text-2xl font-bold mb-4 text-center">Reset Password</h2>
        <p class="text-gray-600 mb-6 text-center">Enter your email address and we'll send you a link to reset your password.</p>
        <form onsubmit="event.preventDefault(); alert('Reset link sent!');">
            <input type="email" required class="w-full p-3 border rounded mb-4" placeholder="Enter email address">
            <button class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700">Send Reset Link</button>
        </form>
        <div class="mt-4 text-center">
            <a href="login.html" class="text-blue-600 hover:underline">Back to Login</a>
        </div>
    </div>
</body>
</html>
