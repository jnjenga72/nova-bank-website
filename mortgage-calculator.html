<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mortgage Calculator - Nova Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <nav class="bg-white shadow py-4 mb-8">
        <div class="container mx-auto px-6">
            <a href="HPP.html" class="flex items-center gap-2 text-blue-600 text-xl font-bold">
                <i class="fas fa-home"></i> Nova Home Loans
            </a>
        </div>
    </nav>

    <div class="container mx-auto px-6 max-w-4xl">
        <div class="bg-white rounded-2xl shadow-lg p-8 md:p-12">
            <h1 class="text-3xl font-bold mb-6 text-gray-900">Mortgage Calculator</h1>
            
            <div class="grid md:grid-cols-2 gap-12">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Loan Amount ($)</label>
                        <input type="number" id="amount" value="300000" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Interest Rate (%)</label>
                        <input type="number" id="rate" value="6.5" step="0.1" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Loan Term (Years)</label>
                        <select id="years" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="30">30 Years</option>
                            <option value="15">15 Years</option>
                            <option value="10">10 Years</option>
                        </select>
                    </div>

                    <button onclick="calculate()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                        Calculate Payment
                    </button>
                </div>

                <div class="bg-blue-50 rounded-xl p-8 flex flex-col justify-center items-center text-center">
                    <p class="text-gray-500 font-semibold mb-2">Estimated Monthly Payment</p>
                    <h2 id="result" class="text-5xl font-bold text-blue-900 mb-4">$1,896</h2>
                    <p class="text-sm text-gray-500">Includes principal and interest only. Taxes and insurance not included.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const amount = parseFloat(document.getElementById('amount').value);
            const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
            const years = parseFloat(document.getElementById('years').value) * 12;

            if(amount && rate && years) {
                const x = Math.pow(1 + rate, years);
                const monthly = (amount * x * rate) / (x - 1);
                document.getElementById('result').innerText = '$' + monthly.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            }
        }
        // Run on load
        calculate();
    </script>
</body>
</html>
