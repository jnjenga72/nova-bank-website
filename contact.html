<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Nova Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <nav class="bg-white shadow py-4">
        <div class="container mx-auto px-6">
            <a href="HPP.html" class="font-bold text-blue-600"><i class="fas fa-home"></i> Home</a>
        </div>
    </nav>
    <div class="container mx-auto px-6 py-12 max-w-2xl">
        <h1 class="text-3xl font-bold mb-8 text-center">Get in Touch</h1>
        <div class="bg-white p-8 rounded-xl shadow-md">
            <form>
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Name</label>
                    <input type="text" class="w-full p-3 border rounded-lg" placeholder="Your Name">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Email</label>
                    <input type="email" class="w-full p-3 border rounded-lg" placeholder="your@email.com">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Message</label>
                    <textarea class="w-full p-3 border rounded-lg h-32" placeholder="How can we help?"></textarea>
                </div>
                <button type="button" onclick="alert('Message Sent! Support will contact you shortly.')" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">Send Message</button>
            </form>
            <div class="mt-8 pt-8 border-t text-center text-gray-600">
                <p>Or call us at: <span class="font-bold text-gray-800">1-800-NOVA-BANK</span></p>
            </div>
        </div>
    </div>
</body>
</html>
